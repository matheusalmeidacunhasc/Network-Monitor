<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        h1 {
            color: #89b4fa;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #313244;
            padding: 10px;
            text-align: left;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #313244;
        }
        .online {
            color: #a6e3a1;
            font-weight: bold;
        }
        .offline {
            color: #f38ba8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Network Monitor Dashboard</h1>
    <p>Últimos 50 registros de monitoramento</p>
    <table>
        <thead>
            <tr>
                <th>Host</th>
                <th>Status</th>
                <th>Data/Hora</th>
            </tr>
        </thead>
        <tbody>
            {% for row in resultados %}
            <tr>
                <td>{{ row[0] }}</td>
                <td class="{{ 'online' if row[1] == 'True' else 'offline' }}">
                    {{ 'Online' if row[1] == 'True' else 'Offline' }}
                </td>
                <td>{{ row[2] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
